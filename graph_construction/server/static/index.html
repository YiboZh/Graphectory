<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Graph Browser</title>
    <link rel="stylesheet" href="/static/browser.css">
    <style>
        /* Sankey entry — styled exactly like a graph-item but always pinned above the list */
        .sankey-item {
            padding: 10px 14px;
            border-bottom: 2px solid #e0e4ff;
            cursor: pointer;
            transition: background .15s;
            background: #f5f7ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sankey-item:hover { background: #eef0ff; }
        .sankey-item-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
        .sankey-item-body { min-width: 0; }
        .sankey-item-title {
            font-size: 13px;
            font-weight: 700;
            color: #3b4ecc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sankey-item-sub {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📊 Trajectory Viewer</h1>
            <p class="subtitle">Graph representations of agent trajectories</p>
        </div>

        <!-- ── Sankey shortcut (styled like a list item) ────────────── -->
        <div class="sankey-item" onclick="openSankey()" title="Open phase Sankey diagram in new tab">
            <span class="sankey-item-icon">🌊</span>
            <div class="sankey-item-body">
                <div class="sankey-item-title">Phase Sankey Diagram</div>
                <div class="sankey-item-sub">Aggregate phase flows across all trajectories</div>
            </div>
        </div>

        <!-- ── Data source configurator ────────────────────────────── -->
        <div class="data-source" id="dataSource">
            <button class="data-source-toggle" id="dataSourceToggle" onclick="toggleDataSource()">
                <span id="dataSourceLabel">Data source</span>
                <span class="ds-chevron" id="dsChevron">▾</span>
            </button>

            <div class="data-source-body" id="dataSourceBody">
                <label class="ds-label" for="trajsInput">Trajectories path</label>
                <input
                    type="text"
                    id="trajsInput"
                    class="ds-input"
                    placeholder="/path/to/trajectories  or  output.jsonl"
                    spellcheck="false"
                    autocomplete="off"
                >
                <label class="ds-label" for="reportInput">Eval report path (optional)</label>
                <input
                    type="text"
                    id="reportInput"
                    class="ds-input"
                    placeholder="/path/to/report.json"
                    spellcheck="false"
                    autocomplete="off"
                >
                <div id="dsError" class="ds-error" style="display:none;"></div>
                <button class="ds-apply-btn" id="dsApplyBtn" onclick="applyDataSource()">
                    Load
                </button>
            </div>
        </div>

        <!-- ── View toggles + search ───────────────────────────────── -->
        <div class="controls">
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search instances…"
                autofocus
            >
            <label class="toggle-row">
                <span class="toggle-label">Verbose node labels</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="nodeVerbosityToggle" checked>
                    <span class="toggle-slider"></span>
                </div>
            </label>
            <label class="toggle-row">
                <span class="toggle-label">Exclude quotes in thought length</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="thoughtQuotesToggle" checked>
                    <span class="toggle-slider"></span>
                </div>
            </label>
            <label class="toggle-row">
                <span class="toggle-label">Filter cd (show ▲ hat)</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="filterCdToggle">
                    <span class="toggle-slider"></span>
                </div>
            </label>
            <label class="toggle-row">
                <span class="toggle-label">Show observation indicators</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="observationToggle">
                    <span class="toggle-slider"></span>
                </div>
            </label>
            <label class="toggle-row">
                <span class="toggle-label">Unique think nodes (by thought)</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="uniqueThinkToggle">
                    <span class="toggle-slider"></span>
                </div>
            </label>
        </div>

        <div class="stats" id="stats">—</div>

        <div class="graph-list" id="graphList">
            <div class="placeholder" style="position:relative;padding:40px;text-align:center;">
                <span style="font-size:36px;opacity:.25;">📂</span>
                <p style="margin-top:12px;color:#aaa;font-size:13px;">
                    Set a data source above to load trajectories.
                </p>
            </div>
        </div>
    </div>

    <div class="main">
        <div id="graphPane" class="graph-pane">
            <div class="placeholder">
                <span class="placeholder-icon">📊</span>
                <p>Select a graph from the list</p>
            </div>
        </div>
    </div>

    <script src="/static/browser.js"></script>
    <script>
        function openSankey() {
            window.open('/sankey', '_blank');
        }
    </script>
</body>
</html>
