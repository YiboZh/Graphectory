<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase Sankey – Trajectory Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .topbar-text h1 { font-size: 18px; font-weight: 700; }
    .topbar-text p  { font-size: 12px; opacity: .85; margin-top: 2px; }
    .back-btn {
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
      margin-left: auto;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,.30); }

    .controls-row {
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-group label { font-size: 12px; font-weight: 600; color: #555; white-space: nowrap; }
    .ctrl-group select {
      font-size: 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 5px 8px;
      outline: none;
      background: #fff;
    }
    .ctrl-group select:focus { border-color: #667eea; }
    .ctrl-group input[type=range] { width: 90px; accent-color: #667eea; }
    .range-val { font-size: 12px; color: #667eea; font-weight: 700; min-width: 28px; }

    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .chip {
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
      cursor: pointer; border: 2px solid transparent;
      transition: opacity .15s, border-color .15s; user-select: none;
    }
    .chip.active   { border-color: #2c3e50; opacity: 1; }
    .chip.inactive { opacity: .32; }
    .chip-loc   { background: #C5B3F0; color: #2c3e50; }
    .chip-patch { background: #FCC9B0; color: #2c3e50; }
    .chip-val   { background: #A8E6F0; color: #2c3e50; }
    .chip-gen   { background: #CFE0F6; color: #2c3e50; }

    .stats-strip {
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      padding: 7px 24px;
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }
    .stats-strip span b { color: #2c3e50; }

    .canvas-wrap { flex: 1; overflow: auto; padding: 24px; min-height: 0; }

    #sankey-svg {
      display: block;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    #tooltip {
      position: fixed;
      background: rgba(22,28,36,.96);
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 9999;
      max-width: 300px;
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
      display: none;
      border: 1px solid rgba(255,255,255,.1);
    }

    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px 20px;
      color: #aaa; font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e5e7eb; border-top-color: #667eea;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-text">
    <h1>🌊 Phase Sankey Diagram</h1>
    <p id="topbar-sub">Aggregated phase transitions across all loaded trajectories</p>
  </div>
  <a class="back-btn" href="/">← Back to browser</a>
</div>

<div class="controls-row">
  <div class="ctrl-group">
    <label>Status</label>
    <select id="filterStatus">
      <option value="all">All trajectories</option>
      <option value="resolved">Resolved only</option>
      <option value="unresolved">Unresolved only</option>
      <option value="unsubmitted">Unsubmitted only</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Max steps</label>
    <input type="range" id="maxSteps" min="5" max="60" value="30" step="1">
    <span class="range-val" id="maxStepsVal">30</span>
  </div>
  <div class="ctrl-group">
    <label>Min flow</label>
    <input type="range" id="minFlow" min="0" max="20" value="1" step="1">
    <span class="range-val" id="minFlowVal">1</span>
  </div>
  <div class="ctrl-group">
    <label>Phases</label>
    <div class="filter-chips">
      <div class="chip chip-loc active"   data-phase="localization">Localization</div>
      <div class="chip chip-patch active" data-phase="patch">Patch</div>
      <div class="chip chip-val active"   data-phase="validation">Validation</div>
      <div class="chip chip-gen active"   data-phase="general">General</div>
    </div>
  </div>
</div>

<div class="stats-strip" id="statsStrip"><span>Loading…</span></div>

<div class="canvas-wrap">
  <div id="placeholder" class="placeholder">
    <div class="spinner"></div>
    <span>Building Sankey…</span>
  </div>
  <svg id="sankey-svg" style="display:none;"></svg>
</div>

<div id="tooltip"></div>

<script>
'use strict';

const PHASE_COLOR = {
  localization: '#C5B3F0',
  patch:        '#FCC9B0',
  validation:   '#A8E6F0',
  general:      '#CFE0F6',
};
const PHASE_STROKE = {
  localization: '#9b7fe8',
  patch:        '#f5956a',
  validation:   '#5bbfd6',
  general:      '#7aaee8',
};
const PHASE_RIBBON = {
  localization: '#b89fe8',
  patch:        '#f5aa80',
  validation:   '#78d0e8',
  general:      '#90bce8',
};
const PHASE_ORDER = ['localization', 'patch', 'validation', 'general'];

let rawData      = null;
let activePhases = new Set(['localization', 'patch', 'validation', 'general']);

async function init() {
  wireControls();
  await fetchData();
}

function wireControls() {
  document.getElementById('filterStatus').addEventListener('change', draw);
  document.getElementById('maxSteps').addEventListener('input', e => {
    document.getElementById('maxStepsVal').textContent = e.target.value;
    draw();
  });
  document.getElementById('minFlow').addEventListener('input', e => {
    document.getElementById('minFlowVal').textContent = e.target.value;
    draw();
  });
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const ph = chip.dataset.phase;
      if (activePhases.has(ph)) {
        if (activePhases.size > 1) {
          activePhases.delete(ph);
          chip.classList.replace('active', 'inactive');
        }
      } else {
        activePhases.add(ph);
        chip.classList.replace('inactive', 'active');
      }
      draw();
    });
  });
}

async function fetchData() {
  try {
    const res = await fetch('/api/sankey');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rawData = await res.json();
    draw();
  } catch (err) {
    showPlaceholder(`⚠ ${err.message}`);
  }
}

function buildFlowData(statusFilter, maxSteps, minFlow) {
  if (!rawData) return null;

  const entries = rawData.trajectories.filter(t =>
    statusFilter === 'all' || t.status === statusFilter
  );

  const stepCounts  = Array.from({ length: maxSteps }, () => ({}));
  const transitions = Array.from({ length: maxSteps }, () => ({}));

  for (const traj of entries) {
    const phases = traj.phases;
    const len    = Math.min(phases.length, maxSteps);
    for (let s = 0; s < len; s++) {
      const ph = phases[s];
      if (!activePhases.has(ph)) continue;
      stepCounts[s][ph] = (stepCounts[s][ph] || 0) + 1;
      if (s + 1 < len) {
        const nph = phases[s + 1];
        if (!activePhases.has(nph)) continue;
        const key = `${ph}\u2192${nph}`;
        transitions[s][key] = (transitions[s][key] || 0) + 1;
      }
    }
  }

  let lastNonEmpty = -1;
  for (let s = 0; s < maxSteps; s++) {
    if (Object.keys(stepCounts[s]).length > 0) lastNonEmpty = s;
  }
  if (lastNonEmpty < 0) return null;

  const trimmedSteps = stepCounts.slice(0, lastNonEmpty + 1);
  const trimmedTrans = transitions.slice(0, lastNonEmpty).map(tmap => {
    const out = {};
    for (const [k, v] of Object.entries(tmap)) {
      if (v >= minFlow) out[k] = v;
    }
    return out;
  });

  return { stepCounts: trimmedSteps, transitions: trimmedTrans, total: entries.length };
}

function draw() {
  if (!rawData) return;
  const statusFilter = document.getElementById('filterStatus').value;
  const maxSteps     = parseInt(document.getElementById('maxSteps').value, 10);
  const minFlow      = parseInt(document.getElementById('minFlow').value, 10);

  const data = buildFlowData(statusFilter, maxSteps, minFlow);
  if (!data || data.stepCounts.length === 0) {
    showPlaceholder('No data for current filter settings.');
    updateStats(0, 0, 0);
    return;
  }
  updateStats(data.total, data.stepCounts.length, rawData.trajectories.length);
  renderSankey(data);
}

function updateStats(filtered, steps, total) {
  const hasBadges  = rawData && rawData.trajectories.some(t => t.status && t.status !== 'none');
  const resolved   = rawData ? rawData.trajectories.filter(t => t.status === 'resolved').length   : 0;
  const unresolved = rawData ? rawData.trajectories.filter(t => t.status === 'unresolved').length : 0;
  let html = `<span><b>${filtered}</b> trajectories shown (of <b>${total}</b>)</span>`;
  html += `<span>Steps shown: <b>${steps}</b></span>`;
  if (hasBadges) {
    html += `<span>Resolved: <b style="color:#065f46">${resolved}</b></span>`;
    html += `<span>Unresolved: <b style="color:#991b1b">${unresolved}</b></span>`;
  }
  document.getElementById('statsStrip').innerHTML = html;
}

/* ================================================================
   Core renderer
   ================================================================ */
function renderSankey(data) {
  const { stepCounts, transitions } = data;
  const nSteps = stepCounts.length;

  const PAD_L    = 16;
  const PAD_R    = 24;
  const PAD_T    = 44;
  const PAD_B    = 36;
  const NODE_W   = 22;
  const RIBBON_GAP = 80;        // horizontal space between bars for ribbons
  const COL_STRIDE = NODE_W + RIBBON_GAP;
  const CHART_H  = 520;
  const PHASE_GAP = 10;

  const SVG_W = PAD_L + nSteps * COL_STRIDE + PAD_R;
  const SVG_H = PAD_T + CHART_H + PAD_B;

  const ns = 'http://www.w3.org/2000/svg';
  function mkEl(tag, attrs = {}, text = '') {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (text) e.textContent = text;
    return e;
  }

  // Left x of column s
  function colX(s) { return PAD_L + s * COL_STRIDE; }

  // Find maxCount for bar height scaling
  let maxCount = 0;
  for (const sc of stepCounts)
    for (const v of Object.values(sc))
      if (v > maxCount) maxCount = v;
  if (maxCount === 0) { showPlaceholder('No data.'); return; }

  /* -- Compute bar layout: { ph -> {y0, y1, count} } per step -- */
  const layout = stepCounts.map(sc => {
    const phases  = PHASE_ORDER.filter(p => sc[p] > 0 && activePhases.has(p));
    const gapTot  = (phases.length - 1) * PHASE_GAP;
    const availH  = CHART_H - gapTot;
    const bars    = {};
    let y = PAD_T;
    for (const ph of phases) {
      const h = Math.max(4, Math.round((sc[ph] / maxCount) * availH));
      bars[ph] = { y0: y, y1: y + h, count: sc[ph] };
      y += h + PHASE_GAP;
    }
    return bars;
  });

  /* -- Compute ribbon slots so ribbons fill the bars exactly --
     For each transition step s:
       outSlots[fromPh][toPh] = {y0,y1} slice on the RIGHT edge of bar s
       inSlots[toPh][fromPh]  = {y0,y1} slice on the LEFT  edge of bar s+1
     Slices are proportional to transition count within each bar.
  */
  function buildSlots(s) {
    const tmap    = transitions[s] || {};
    const outSlots = {};
    const inSlots  = {};

    // outgoing slices: split each source bar's right edge by outgoing-flow proportion
    for (const fromPh of PHASE_ORDER) {
      if (!layout[s]?.[fromPh]) continue;
      const bar = layout[s][fromPh];
      const outgoing = PHASE_ORDER
        .filter(toPh => (tmap[`${fromPh}\u2192${toPh}`] || 0) > 0)
        .map(toPh => ({ toPh, count: tmap[`${fromPh}\u2192${toPh}`] }));
      const totalOut = outgoing.reduce((a, b) => a + b.count, 0);
      const barH     = bar.y1 - bar.y0;
      let curY = bar.y0;
      outSlots[fromPh] = {};
      for (const { toPh, count } of outgoing) {
        const h = totalOut > 0 ? (count / totalOut) * barH : 0;
        outSlots[fromPh][toPh] = { y0: curY, y1: curY + h };
        curY += h;
      }
    }

    // incoming slices: split each dest bar's left edge by incoming-flow proportion
    if (layout[s + 1]) {
      for (const toPh of PHASE_ORDER) {
        if (!layout[s + 1]?.[toPh]) continue;
        const bar = layout[s + 1][toPh];
        const incoming = PHASE_ORDER
          .filter(fromPh => (tmap[`${fromPh}\u2192${toPh}`] || 0) > 0)
          .map(fromPh => ({ fromPh, count: tmap[`${fromPh}\u2192${toPh}`] }));
        const totalIn = incoming.reduce((a, b) => a + b.count, 0);
        const barH    = bar.y1 - bar.y0;
        let curY = bar.y0;
        inSlots[toPh] = {};
        for (const { fromPh, count } of incoming) {
          const h = totalIn > 0 ? (count / totalIn) * barH : 0;
          inSlots[toPh][fromPh] = { y0: curY, y1: curY + h };
          curY += h;
        }
      }
    }

    return { outSlots, inSlots };
  }

  const allSlots = transitions.map((_, s) => buildSlots(s));

  /* ============================================================
     Build SVG — all defs collected first, then layers appended
     ============================================================ */
  const svg = document.getElementById('sankey-svg');
  svg.setAttribute('width',   SVG_W);
  svg.setAttribute('height',  SVG_H);
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.style.display = 'block';
  svg.innerHTML = '';

  // 1. Defs — all gradients pre-built before any ribbons are drawn
  const defsEl = mkEl('defs');
  for (const fromPh of PHASE_ORDER) {
    for (const toPh of PHASE_ORDER) {
      const lg = mkEl('linearGradient', {
        id: `rg_${fromPh}_${toPh}`,
        gradientUnits: 'userSpaceOnUse',
        x1: '0', y1: '0', x2: '1', y2: '0',   // x1/x2 updated per ribbon below
      });
      lg.appendChild(mkEl('stop', { offset: '0%',   'stop-color': PHASE_RIBBON[fromPh], 'stop-opacity': '0.80' }));
      lg.appendChild(mkEl('stop', { offset: '100%', 'stop-color': PHASE_RIBBON[toPh],   'stop-opacity': '0.80' }));
      defsEl.appendChild(lg);
    }
  }
  svg.appendChild(defsEl);   // defsEl is in the DOM — safe to querySelector below

  // 2. Background
  svg.appendChild(mkEl('rect', { width: SVG_W, height: SVG_H, fill: '#fff', rx: 12 }));

  // 3. Subtle alternating column shading
  const stripeG = mkEl('g');
  for (let s = 0; s < nSteps; s++) {
    if (s % 2 === 1) {
      stripeG.appendChild(mkEl('rect', {
        x: colX(s) - 4, y: PAD_T - 4,
        width: NODE_W + 8, height: CHART_H + 8,
        fill: '#f8f9fb', rx: 4
      }));
    }
  }
  svg.appendChild(stripeG);

  // 4. Ribbon layer — filled cubic-bezier area paths
  const ribbonG = mkEl('g');

  for (let s = 0; s < transitions.length; s++) {
    const tmap = transitions[s];
    if (!tmap || Object.keys(tmap).length === 0) continue;
    const { outSlots, inSlots } = allSlots[s];

    // Right edge of bar s, left edge of bar s+1
    const x0   = colX(s) + NODE_W;
    const x1   = colX(s + 1);
    const midX = (x0 + x1) / 2;

    for (const [key, count] of Object.entries(tmap)) {
      const [fromPh, toPh] = key.split('\u2192');
      const srcSlot = outSlots[fromPh]?.[toPh];
      const dstSlot = inSlots[toPh]?.[fromPh];
      if (!srcSlot || !dstSlot) continue;

      const sy0 = srcSlot.y0, sy1 = srcSlot.y1;
      const dy0 = dstSlot.y0, dy1 = dstSlot.y1;

      // Update gradient x extents to span this ribbon's actual width
      const gradEl = svg.querySelector(`#rg_${fromPh}_${toPh}`);
      if (gradEl) {
        gradEl.setAttribute('x1', x0);
        gradEl.setAttribute('x2', x1);
      }

      // Filled area: top bezier + right edge + bottom bezier (reversed) + left edge
      const d = [
        `M ${x0} ${sy0}`,
        `C ${midX} ${sy0}, ${midX} ${dy0}, ${x1} ${dy0}`,
        `L ${x1} ${dy1}`,
        `C ${midX} ${dy1}, ${midX} ${sy1}, ${x0} ${sy1}`,
        'Z'
      ].join(' ');

      const isSelf    = fromPh === toPh;
      const baseOpacity = isSelf ? '0.40' : '0.60';

      const path = mkEl('path', {
        d,
        fill:    `url(#rg_${fromPh}_${toPh})`,
        stroke:  'none',
        opacity: baseOpacity,
        style:   'cursor:pointer; transition:opacity .12s;',
      });

      path.addEventListener('mouseenter', e => {
        path.setAttribute('opacity', '0.90');
        showTooltip(e, { from: fromPh, to: toPh, count, step: s });
      });
      path.addEventListener('mousemove',  moveTooltip);
      path.addEventListener('mouseleave', () => {
        path.setAttribute('opacity', baseOpacity);
        hideTooltip();
      });

      ribbonG.appendChild(path);
    }
  }
  svg.appendChild(ribbonG);

  // 5. Phase bars (drawn on top so they're always crisp)
  const barG = mkEl('g');

  for (let s = 0; s < nSteps; s++) {
    const x    = colX(s);
    const bars = layout[s];

    for (const [ph, { y0, y1, count }] of Object.entries(bars)) {
      const h = y1 - y0;

      // Drop shadow
      barG.appendChild(mkEl('rect', {
        x: x + 2, y: y0 + 2, width: NODE_W, height: h, rx: 4,
        fill: '#000', opacity: '0.07'
      }));

      // Bar body
      const rect = mkEl('rect', {
        x, y: y0, width: NODE_W, height: h, rx: 4,
        fill: PHASE_COLOR[ph],
        stroke: PHASE_STROKE[ph],
        'stroke-width': '1.5',
        style: 'cursor:pointer;',
      });
      rect.addEventListener('mouseenter', e => showTooltip(e, { phase: ph, step: s, count }));
      rect.addEventListener('mousemove',  moveTooltip);
      rect.addEventListener('mouseleave', hideTooltip);
      barG.appendChild(rect);

      // Count label
      if (h >= 16) {
        barG.appendChild(mkEl('text', {
          x: x + NODE_W / 2, y: y0 + h / 2 + 4,
          'text-anchor': 'middle', 'font-size': '9', 'font-weight': '700',
          fill: '#2c3e50', 'pointer-events': 'none',
        }, count.toString()));
      }
    }
  }
  svg.appendChild(barG);

  // 6. Step axis labels
  const axisG     = mkEl('g');
  const labelEvery = nSteps <= 20 ? 1 : nSteps <= 40 ? 2 : 5;
  axisG.appendChild(mkEl('text', {
    x: PAD_L - 2, y: PAD_T + CHART_H + 22,
    'text-anchor': 'start', 'font-size': '10', fill: '#94a3b8', 'font-weight': '600',
  }, 'Step:'));
  for (let s = 0; s < nSteps; s++) {
    if (s % labelEvery !== 0 && s !== nSteps - 1) continue;
    axisG.appendChild(mkEl('text', {
      x: colX(s) + NODE_W / 2, y: PAD_T + CHART_H + 22,
      'text-anchor': 'middle', 'font-size': '10', fill: '#94a3b8', 'font-weight': '500',
    }, `${s + 1}`));
  }
  svg.appendChild(axisG);

  // 7. Legend
  const legG      = mkEl('g');
  const legPhases = PHASE_ORDER.filter(p => activePhases.has(p));
  legPhases.forEach((ph, i) => {
    const lx = PAD_L + i * 130;
    legG.appendChild(mkEl('rect', {
      x: lx, y: 7, width: 14, height: 14, rx: 3,
      fill: PHASE_COLOR[ph], stroke: PHASE_STROKE[ph], 'stroke-width': '1.5'
    }));
    legG.appendChild(mkEl('text', {
      x: lx + 18, y: 18,
      'font-size': '11', fill: '#444', 'font-weight': '600'
    }, ph.charAt(0).toUpperCase() + ph.slice(1)));
  });
  svg.appendChild(legG);

  hidePlaceholder();
}

/* ================================================================
   Tooltip
   ================================================================ */
const tooltip = document.getElementById('tooltip');

function showTooltip(e, info) {
  let html = '';
  if (info.phase) {
    const pct = rawData
      ? Math.round(100 * info.count / rawData.trajectories.length)
      : '?';
    html  = `<b style="color:${PHASE_RIBBON[info.phase]}">${capitalize(info.phase)}</b>`;
    html += `<br>Step <b>${info.step + 1}</b>`;
    html += `<br><b>${info.count}</b> trajectories (${pct}%)`;
  } else {
    html  = `<b style="color:${PHASE_RIBBON[info.from]}">${capitalize(info.from)}</b>`;
    html += info.from === info.to
      ? ` <span style="color:#aaa">→ stays same phase</span>`
      : ` → <b style="color:${PHASE_RIBBON[info.to]}">${capitalize(info.to)}</b>`;
    html += `<br>Step ${info.step + 1} → ${info.step + 2}`;
    html += `<br><b>${info.count}</b> trajectories`;
  }
  tooltip.innerHTML     = html;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = Math.min(e.clientX + 16, window.innerWidth  - 320) + 'px';

function showPlaceholder(msg = '') {
  document.getElementById('sankey-svg').style.display = 'none';
  const ph = document.getElementById('placeholder');

  ph.innerHTML = msg
    ? `<span style="font-size:28px;opacity:.35">📊</span><span style="color:#999">${msg}</span>`
    : '<div class="spinner"></div><span>Building Sankey…</span>';
}
function hidePlaceholder() {
  document.getElementById('placeholder').style.display = 'none';
}
